name: Update Products

on:
  schedule:
    # Every day at 02:00 AM CET (01:00 UTC in winter, 00:00 UTC in summer)
    - cron: '0 1 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate products from XML feed
        run: node scripts/generate-products.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --quiet data/products.json || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add data/products.json
          git commit -m "Update products from feed ($(date +'%Y-%m-%d'))"
          git push
